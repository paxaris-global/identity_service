spring.application.name=identity_service
server.port=8087

# ===============================
# CORS (global, dynamic from env)
# ===============================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:*}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=${ALLOWED_METHODS:*}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=${ALLOWED_HEADERS:*}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# ===============================
# Routes (dynamic via env vars)
# ===============================
# Project Manager microservice
spring.cloud.gateway.routes[0].id=project-manager
spring.cloud.gateway.routes[0].uri=${PROJECT_MANAGER_URL}
spring.cloud.gateway.routes[0].predicates[0]=Path=/project/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Auth (Keycloak signup/signin) route
spring.cloud.gateway.routes[1].id=keycloak-auth
spring.cloud.gateway.routes[1].uri=${KEYCLOAK_BASE_URL}
spring.cloud.gateway.routes[1].predicates[0]=Path=/realms/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# ===============================
# Security (JWT validation)
# ===============================
# Note: DynamicJwtDecoder overrides this at runtime,
# so we only give a placeholder value.
#spring.security.oauth2.resourceserver.jwt.issuer-uri=${DUMMY_ISSUER:http://placeholder}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_BASE_URL}/realms/${KEYCLOAK_REALM}


# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.org.springframework.cloud.gateway=${GATEWAY_LOG_LEVEL:INFO}
logging.pattern.level=%5p [traceId=%X{traceId:-},spanId=%X{spanId:-},correlationId=%X{correlationId:-}]

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.endpoints.web.exposure.include=health,info

# ===============================
# Keycloak configuration master
# ===============================
keycloak.base-url=${KEYCLOAK_BASE_URL}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.admin-username=${KEYCLOAK_ADMIN:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:admin-cli}
keycloak.master-realm=${KEYCLOAK_MASTER_REALM:master}
keycloak.realm-management-client=${KEYCLOAK_REALM_MANAGEMENT_CLIENT:realm-management}
keycloak.protocol=${KEYCLOAK_PROTOCOL:openid-connect}

identity.default-admin.username=${IDENTITY_DEFAULT_ADMIN_USERNAME:admin}
identity.default-admin.email=${IDENTITY_DEFAULT_ADMIN_EMAIL:admin@paxarisglobal.com}
identity.default-admin.first-name=${IDENTITY_DEFAULT_ADMIN_FIRST_NAME:Admin}
identity.default-admin.last-name=${IDENTITY_DEFAULT_ADMIN_LAST_NAME:User}
identity.default-admin.realm-management-roles=${IDENTITY_DEFAULT_ADMIN_REALM_MANAGEMENT_ROLES:create-client,impersonation,manage-realm,manage-users,manage-clients}
identity.login.default-product-id=${IDENTITY_LOGIN_DEFAULT_PRODUCT_ID:product-service}
identity.token-config.access-token-lifespan-seconds=${IDENTITY_ACCESS_TOKEN_LIFESPAN_SECONDS:7200}
identity.token-config.sso-session-idle-timeout-seconds=${IDENTITY_SSO_SESSION_IDLE_TIMEOUT_SECONDS:28800}
identity.token-config.sso-session-max-lifespan-seconds=${IDENTITY_SSO_SESSION_MAX_LIFESPAN_SECONDS:86400}
identity.jwt.issuer-host-rewrite.from=${IDENTITY_JWT_ISSUER_HOST_REWRITE_FROM:localhost}
identity.jwt.issuer-host-rewrite.to=${IDENTITY_JWT_ISSUER_HOST_REWRITE_TO:keycloak-server}

# ===============================
# Project management configurationss
# ===============================
project.management.base-url=${PROJECT_MANAGER_URL}
project.management.role-sync-path=${PROJECT_MANAGEMENT_ROLE_SYNC_PATH:/api/v1/project/roles/save-or-update}
project.management.provision-upload-path=${PROJECT_MANAGEMENT_PROVISION_UPLOAD_PATH:/api/v1/project/provision/upload}

# ===============================
# Swagger/OpenAPI Configuration
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.show-logo=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.use-fqn=true
springdoc.info.title=Identity Service API
springdoc.info.version=1.0.0
springdoc.info.description=Identity Service provides authentication and authorization APIs using Keycloak
springdoc.info.contact.name=Paxaris Global
springdoc.info.contact.url=https://paxarisglobal.com
springdoc.info.contact.email=support@paxarisglobal.com
springdoc.info.license.name=Apache 2.0
springdoc.info.license.url=https://www.apache.org/licenses/LICENSE-2.0.html
springdoc.external-docs.description=Keycloak Documentation
springdoc.external-docs.url=https://www.keycloak.org/docs/latest/

docker.hub.username=${DOCKER_USERNAME}
docker.hub.password=${DOCKER_PASSWORD}

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

github.org=${GITHUB_ORG}
github.token=${GITHUB_TOKEN}


